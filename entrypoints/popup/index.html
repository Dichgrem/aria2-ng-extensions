<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria2-helper</title>
  <script type="module" src="./main.ts"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      padding: 15px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #1e1e1e;
    }

    .container {
      background: #252525;
      border-radius: 8px;
      padding: 20px;
      border: 1px solid #3d3d3d;
    }

    h1 {
      font-size: 18px;
      color: #ffffff;
      margin-bottom: 15px;
      text-align: center;
      font-weight: 600;
    }

    .btn {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #0066cc;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #0077ed;
    }

    .btn:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: #cc3333;
      color: #ffffff;
    }

    .btn-secondary:hover {
      background: #e63939;
    }

    .hint {
      font-size: 11px;
      color: #888888;
      text-align: center;
      margin-top: 15px;
      padding-top: 10px;
      border-top: 1px solid #3d3d3d;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1 aria-label="Extension Name">Aria2-helper</h1>

    <button id="openAriang" class="btn" type="button">Open Panel</button>
    <button id="openSettings" class="btn btn-secondary" type="button">Settings</button>

    <div class="hint">
      Right-click any link to download with Aria2
    </div>
  </div>
</body>
</html>
