<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aria2-helper - Settings</title>
  <script type="module" src="./main.ts"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      background: #0d1117;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      max-width: 800px;
      margin: 0 auto;
      background: #161b22;
      border-radius: 12px;
      border: 1px solid #30363d;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      padding: 40px;
    }

    h1 {
      color: #e6edf3;
      margin-bottom: 30px;
      font-size: 28px;
      text-align: center;
    }

    .section {
      margin-bottom: 30px;
      padding: 20px;
      background: #21262d;
      border-radius: 8px;
      border: 1px solid #30363d;
    }

    .section h2 {
      color: #58a6ff;
      margin-bottom: 20px;
      font-size: 20px;
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      color: #8b949e;
      font-weight: 500;
      font-size: 14px;
    }

    input[type="text"],
    input[type="password"],
    input[type="number"],
    select {
      width: 100%;
      padding: 12px;
      border: 1px solid #30363d;
      border-radius: 6px;
      font-size: 14px;
      background: #0d1117;
      color: #e6edf3;
      transition: border-color 0.3s;
    }

    input::placeholder {
      color: #484f58;
    }

    input:focus,
    select:focus {
      outline: none;
      border-color: #58a6ff;
    }

    .checkbox-group {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    input[type="checkbox"] {
      width: 20px;
      height: 20px;
      cursor: pointer;
      accent-color: #58a6ff;
    }

    .help-text {
      font-size: 12px;
      color: #6e7681;
      margin-top: 5px;
    }

    .btn {
      background: #238636;
      color: white;
      padding: 12px 30px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      width: 100%;
    }

    .btn:hover {
      background: #2ea043;
      box-shadow: 0 4px 12px rgba(35, 134, 54, 0.4);
    }

    .btn:active {
      transform: translateY(0);
    }

    .row {
      display: flex;
      gap: 20px;
    }

    .col {
      flex: 1;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 20px;
      display: none;
    }

    .status.success {
      background: rgba(35, 134, 54, 0.2);
      color: #3fb950;
      border: 1px solid #238636;
    }

    .status.error {
      background: rgba(248, 81, 73, 0.2);
      color: #f85149;
      border: 1px solid #da3633;
    }

    .connection-status {
      display: inline-block;
      padding: 5px 10px;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 600;
      background: rgba(248, 81, 73, 0.2);
      color: #f85149;
    }

    .connection-status.connected {
      background: rgba(35, 134, 54, 0.2);
      color: #3fb950;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Aria2-helper - Settings</h1>

    <div id="status" class="status"></div>

    <div class="section">
      <h2 aria-label="General">General</h2>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="enabled" checked>
          <label for="enabled">Intercept Downloads (Disable to let browser handle downloads normally)</label>
        </div>
      </div>
    </div>

    <div class="section">
      <h2 aria-label="RPC Connection Settings">RPC Connection Settings</h2>

      <div class="row">
        <div class="col">
          <div class="form-group">
            <label for="rpcProtocol">Protocol</label>
            <select id="rpcProtocol">
              <option value="http">HTTP</option>
              <option value="https">HTTPS</option>
            </select>
          </div>
        </div>
        <div class="col">
          <div class="form-group">
            <label for="rpcPort">Port</label>
            <input type="number" id="rpcPort" placeholder="6800">
          </div>
        </div>
      </div>

      <div class="form-group">
        <label for="rpcHost">Host</label>
        <input type="text" id="rpcHost" placeholder="localhost">
      </div>

      <div class="form-group">
        <label for="rpcSecret">Secret Token (Optional)</label>
        <input type="password" id="rpcSecret" placeholder="Your aria2 RPC secret">
      </div>

      <div class="form-group">
        <label>Connection Status: <span id="connectionStatus" class="connection-status">Disconnected</span></label>
        <button type="button" id="testConnection" class="btn" style="margin-top: 10px; width: auto;">Test Connection</button>
      </div>
    </div>

    <div class="section">
      <h2 aria-label="Notifications">Notifications</h2>

      <div class="form-group">
        <div class="checkbox-group">
          <input type="checkbox" id="showNotifications" checked>
          <label for="showNotifications">Show Notifications</label>
        </div>
      </div>
    </div>

    <button type="button" id="saveSettings" class="btn">Save Settings</button>
  </div>
</body>
</html>
